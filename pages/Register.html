<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Business Solutions</title>
  <link rel="stylesheet" href="../css/Register.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-visual">
        <a class="auth-brand" href="../index.html">
          <img src="../images/logo.webp" alt="Business Solutions logo">
        </a>
        <div>
          <p class="visual-label">Business Solutions</p>
          <h2>Build your workspace for smarter growth.</h2>
          <p class="hero-text">Create an account to organize services, projects, and customer support.</p>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-copy">
          <p class="auth-label">Start growing</p>
          <h1>Create your account</h1>
          <p class="auth-text">Register to manage services, projects, and business solutions.</p>
        </div>

        <form class="auth-form register-form" novalidate>
          <label for="register-role">Register as</label>
          <select id="register-role" name="role" required>
            <option value="" disabled selected>Select role</option>
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>

          <label for="register-name">Full name</label>
          <input
            id="register-name"
            type="text"
            name="name"
            placeholder="Letters only, max 16"
            minlength="2"
            maxlength="16"
            autocomplete="name"
            required
          >

          <label for="register-email">Email address</label>
          <input id="register-email" type="email" placeholder="you@example.com" required>

          <label for="register-password">Password</label>
          <input
            id="register-password"
            type="password"
            placeholder="Minimum 8 characters"
            minlength="8"
            autocomplete="new-password"
            required
          >

          <label for="confirm-password">Confirm password</label>
          <input
            id="confirm-password"
            type="password"
            placeholder="Re-enter password (min 8)"
            minlength="8"
            autocomplete="new-password"
            required
          >

          <p class="form-message" aria-live="polite"></p>
          <button class="auth-submit" type="submit">Register</button>
        </form>

        <p class="auth-switch">
          Already have an account?
          <a href="Login.html">Login</a>
        </p>

        <a class="back-home" href="../index.html">Back to Home</a>
      </div>
    </section>
  </main>

  <script>
    const registerForm = document.querySelector(".register-form");
    const formMessage = document.querySelector(".form-message");
    const roleSelect = document.querySelector("#register-role");
    const nameInput = document.querySelector("#register-name");
    const passwordInput = document.querySelector("#register-password");
    const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);
    const isValidName = (name) => /^[A-Za-z ]{2,16}$/.test(name);

    nameInput.addEventListener("input", function () {
      this.value = this.value.replace(/[^A-Za-z ]/g, "").slice(0, 16);
    });

    registerForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const role = roleSelect.value;
      const name = nameInput.value.trim();
      const email = document.querySelector("#register-email").value.trim();
      const password = passwordInput.value.trim();
      const confirmPassword = document.querySelector("#confirm-password").value.trim();

      if (!role) {
        formMessage.textContent = "Please select Admin or Customer.";
        formMessage.className = "form-message error";
        return;
      }

      if (name.length < 2) {
        formMessage.textContent = "Name must be at least 2 characters.";
        formMessage.className = "form-message error";
        nameInput.focus();
        return;
      }

      if (name.length > 16) {
        formMessage.textContent = "Name must be 16 characters or less.";
        formMessage.className = "form-message error";
        nameInput.focus();
        return;
      }

      if (!isValidName(name)) {
        formMessage.textContent = "Name can contain only letters (A–Z) and spaces.";
        formMessage.className = "form-message error";
        nameInput.focus();
        return;
      }

      if (!/^[A-Za-z]/.test(name) || !/[A-Za-z]$/.test(name)) {
        formMessage.textContent = "Name must start and end with a letter.";
        formMessage.className = "form-message error";
        nameInput.focus();
        return;
      }

      if (!isValidEmail(email)) {
        formMessage.textContent = "Please enter a valid email address.";
        formMessage.className = "form-message error";
        return;
      }

      if (password.length < 8) {
        formMessage.textContent = "Password must be at least 8 characters.";
        formMessage.className = "form-message error";
        passwordInput.focus();
        return;
      }

      if (password !== confirmPassword) {
        formMessage.textContent = "Passwords do not match.";
        formMessage.className = "form-message error";
        return;
      }

      localStorage.setItem(
        "profile:" + email.toLowerCase(),
        JSON.stringify({ name: name, role: role })
      );

      formMessage.textContent = "Registration successful. Redirecting to login...";
      formMessage.className = "form-message success";
      registerForm.reset();

      setTimeout(function () {
        window.location.href = "Login.html?role=" + encodeURIComponent(role);
      }, 1000);
    });
  </script>
</body>
</html>
