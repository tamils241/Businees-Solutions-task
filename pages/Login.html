<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Business Solutions</title>
  <link rel="stylesheet" href="../css/Login.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-visual">
        <a class="auth-brand" href="../index.html">
          <img src="../images/logo.webp" alt="Business Solutions logo">
        </a>
        <div>
          <p class="visual-label">Business Solutions</p>
         <h2>Stay connected to every growth move.</h2>
         <p class="hero-text">
         Manage your services, support, and business updates from one calm workspace.
         </p>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-copy">
          <p class="auth-label">Welcome back</p>
          <h1>Login to your account</h1>
          <p class="auth-text">
           Access your dashboard, services, and business growth tools.
          </p>
        </div>

        <form class="auth-form login-form" novalidate>
          <label for="login-role">Sign in as</label>
          <select id="login-role" name="role" required>
            <option value="" disabled selected>Select role</option>
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>

          <label for="login-email">Email address</label>
          <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="username">

          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="Minimum 8 characters" required autocomplete="current-password">

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" id="remember-me" name="remember">
              <span>Remember me</span>
            </label>
            <button class="link-button forgot-toggle" type="button">Forgot password?</button>
          </div>

          <p class="form-message" aria-live="polite"></p>
          <button class="auth-submit" type="submit">Login</button>
        </form>

        <form class="auth-form forgot-form" novalidate hidden>
          <label for="forgot-email">Registered email address</label>
          <input id="forgot-email" type="email" placeholder="you@example.com" required>
          <p class="forgot-message" aria-live="polite"></p>
          <button class="auth-submit" type="submit">Send reset link</button>
          <button class="link-button back-login" type="button">Back to login</button>
        </form>

        <p class="auth-switch">
          Don't have an account?
          <a href="Register.html">Create account</a>
        </p>

        <a class="back-home" href="../index.html">Back to Home</a>
      </div>
    </section>
  </main>

  <script>
    const loginForm = document.querySelector(".login-form");
    const forgotForm = document.querySelector(".forgot-form");
    const forgotToggle = document.querySelector(".forgot-toggle");
    const backLogin = document.querySelector(".back-login");
    const formMessage = document.querySelector(".form-message");
    const forgotMessage = document.querySelector(".forgot-message");
    const roleSelect = document.querySelector("#login-role");
    const rememberMe = document.querySelector("#remember-me");
    const passwordInput = document.querySelector("#login-password");
    const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);

    // Must match your real file names in pages/
    const dashboards = {
      admin: "admin_Dashboard.html",
      customer: "customer_deshboard.html",
    };

    function saveAuth(role, email, name) {
      sessionStorage.setItem("authRole", role);
      sessionStorage.setItem("authEmail", email);
      sessionStorage.setItem("authName", name);
      localStorage.setItem("auth", JSON.stringify({ role, email, name }));
    }

    const params = new URLSearchParams(window.location.search);
    const roleFromUrl = params.get("role");
    if (roleFromUrl && dashboards[roleFromUrl]) {
      roleSelect.value = roleFromUrl;
    }

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const role = roleSelect.value;
      const email = document.querySelector("#login-email").value.trim();
      const password = passwordInput.value.trim();

      if (!role) {
        formMessage.textContent = "Please select Admin or Customer.";
        formMessage.className = "form-message error";
        return;
      }

      if (!rememberMe.checked) {
        formMessage.textContent = "Please select the Remember me checkbox to continue.";
        formMessage.className = "form-message error";
        rememberMe.focus();
        alert("Please select the Remember me button.");
        return;
      }

      if (!isValidEmail(email)) {
        formMessage.textContent = "Please enter a valid email address.";
        formMessage.className = "form-message error";
        return;
      }

      if (password.length < 8) {
        formMessage.textContent = "Password must be at least 8 characters.";
        formMessage.className = "form-message error";
        passwordInput.focus();
        return;
      }

      const profile = JSON.parse(
        localStorage.getItem("profile:" + email.toLowerCase()) || "{}"
      );
      const rawName = profile.name || email.split("@")[0];
      const displayName =
        rawName.charAt(0).toUpperCase() + rawName.slice(1);

      saveAuth(role, email, displayName);

      formMessage.textContent = "Login successful. Redirecting...";
      formMessage.className = "form-message success";

      setTimeout(function () {
        window.location.href = dashboards[role];
      }, 600);
    });

    forgotToggle.addEventListener("click", function () {
      loginForm.hidden = true;
      forgotForm.hidden = false;
      formMessage.textContent = "";
      formMessage.className = "form-message";
    });

    backLogin.addEventListener("click", function () {
      forgotForm.hidden = true;
      loginForm.hidden = false;
      forgotMessage.textContent = "";
      forgotMessage.className = "forgot-message";
    });

    forgotForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const email = document.querySelector("#forgot-email").value.trim();
      if (!isValidEmail(email)) {
        forgotMessage.textContent = "Please enter your registered email address.";
        forgotMessage.className = "forgot-message error";
        return;
      }
      forgotMessage.textContent = "Password reset link sent successfully.";
      forgotMessage.className = "forgot-message success";
      forgotForm.reset();
    });
  </script>
</body>
</html>
